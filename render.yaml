services:
  - type: web
    name: linkflow-whatsapp
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_DATABASE_ID
        sync: false
      - key: FIREBASE_API_KEY
        sync: false
